<body>

  <h1>Programa Calcular Frete</h1>

  <form>

    <select id="inEstado" required>
      <option value="">Selecione o estado</option>
      <option value="SP">São Paulo - SP</option>
      <option value="RJ">Rio de Janeiro - RJ</option>
      <option value="MG">Minas Gerais - MG</option>
      <option value="outros">Outros Estados</option>
    </select>

    <p>
      Valor Compra R$:
      <input type="number" id="inValor" required>
    </p>
    <input type="submit" value="Valor Frete">
  </form>
  <h3 id="valorCompra"></h3>
  <h3 id="saidaFrete"></h3>
