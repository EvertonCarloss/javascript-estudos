<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 2 | Calcular Média</title>
</head>

<body>

  <!-- Título do programa -->
  <h1>Programa Calcula Média</h1>

  <!-- Formulário -->
  <form>

    <p>
      Materia:
      <input type="text" id="materia" required>
    </p>

    <p>
      Nota 1ª:
      <input type="number" id="notaUm" required>
    </p>

    <p>
      Nota 2ª:
      <input type="number" id="notaDois" required>
    </p>

    <p>
      Nota 3ª:
      <input type="number" id="notaTres" required>
    </p>

    <input type="submit" value="Verificar Média">

  </form>
  <h3 id="materiaSaida"></h3>
  <h3 id="mediaFinal"></h3>
  <script src="ex1_2.js"></script>
</body>

</html>
