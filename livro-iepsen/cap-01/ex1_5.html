<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo do dobro de um número</title>
</head>

<body>

  <script>

    const numero = prompt("Número:")
    const dobro = numero * 2
    alert("Dobro é: " + dobro)
  </script>

  <!-- Se quisermos calcular o dobro do número a partir de uma operação de adição, a conversão é necessária. Para isso, pode-se utilizar o método Number() direto na entrada de dados: const num = Number(prompt("Número:")) -->

</body>

</html>
