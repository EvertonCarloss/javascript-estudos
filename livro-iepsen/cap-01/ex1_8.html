<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo da duração de horas de uma viagem</title>
</head>

<body>

  <script>

    const dias = Number(prompt("Nº Dias: "))
    const horas = Number(prompt("Nº Horas: "))
    const total = (dias * 24) + horas;

    alert(`Total de Horas: ${total} horas de viagem`)

  </script>

</body>

</html>
