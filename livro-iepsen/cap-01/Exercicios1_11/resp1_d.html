<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elaborar um programa que leia 2 notas</title>
</head>

<body>

  <!--  Elaborar um programa que leia 2 notas de um aluno em uma disciplina.
  Calcule e informe a média das notas.
  
  Exemplo:

  1ª Nota: 7.0
  2ª Nota: 8.0
  Média: 7.5

-->

  <script>

    alert(`Nota de Matematica!`)

    // Entrada;
    const notaUm = Number(prompt("Nota 1º: "))
    const notaDois = Number(prompt("Nota 2º: "))

    // Processamento;
    const media = (notaUm + notaDois) / 2;

    // Saída;
    alert(`Nota 1º: ${notaUm.toFixed(1)}\nNota 2º: ${notaDois.toFixed(1)}\nMédia: ${media.toFixed(1)}`)

  </script>

</body>

</html>
