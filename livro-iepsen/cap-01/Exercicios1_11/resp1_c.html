<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elaborar um programa para uma loja</title>
</head>

<body>

  <!-- Elaborar um programa para uma loja, o qual leia o preço de um produto
  e informe as opções de pagamento da loja. Calcule e informe o valor para
  pagamento à vista com 10% de desconto e o valor em 3x.

  Exemplo:
  
  Preço R$: 60.00
  À Vista R$: 54.00
  Ou 3x de R$: 20.00
 -->

  <script>

    alert(`Bem vindo a nossa loja!`)

    // Entrada do valor;
    const precoProduto = Number(prompt("Preço Produto R$: "))

    // Processamento dos valores;
    const avista = precoProduto * 0.9;
    const parcelado = precoProduto / 3;

    // Saída;
    alert(`Preço R$: ${precoProduto.toFixed(2)}\nÁ Vista R$: ${avista.toFixed(2)}\nOu 3x de R$: ${parcelado.toFixed(2)}`)


  </script>


</body>

</html>
