<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Informar número anterior e posterios</title>
</head>

<body>

  <!-- Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, ou seja, o número anterior e posterior -->

  <script>

    alert("Informando os vizinhos de um número!")

    // Entrada;
    const numero = Number(prompt("Informe o Número: "))

    // Processamento e Saída;
    alert(`Vizinhos: ${numero - 1} e ${numero + 1}`)


  </script>

</body>

</html>
