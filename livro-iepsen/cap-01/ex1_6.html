<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soma de dois números</title>
</head>

<body>

  <script>

    const numeroUm = Number(prompt("Número 1º:"))
    const numeroDois = Number(prompt("Número 2º:"))
    const soma = numeroUm + numeroDois;


    alert(`A soma entre os dois números é: ${soma}`);

  </script>

</body>

</html>
