<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmácia JS</title>
</head>

<body>

  <h1>Farmácia JS</h1>

  <form>

    <p>
      Medicamento:
      <input type="text" id="inMedicamento" required>
    </p>

    <p>
      Preço R$:
      <input type="number" id="inPreco" step="0.01" min="0" required>
    </p>

    <input type="submit" value="Mostrar Promoção">


  </form>
  <h3 id="inPromocao"></h3>
  <h3 id="inValorPromocao"></h3>
  <script src="js/ex2_a.js"></script>
</body>

</html>
