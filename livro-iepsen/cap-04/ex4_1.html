<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programa Situação do Aluno</title>
</head>

<body>


  <h1>Programa Situação do Aluno</h1>

  <form>
    <p>
      Nome do Aluno:
      <input type="text" id="inNome" required>
    </p>

    <p>
      1º Nota:
      <input type="number" id="inNota1" step="0.1" max="10" required>
    </p>

    <p>
      2º Nota:
      <input type="number" id="inNota2" step="0.1" max="10" required>
    </p>

    <input type="submit" value="Exibir Média e Situação">
  </form>
  <h3></h3>
  <h4></h4>
  <script src="js/ex4_1.js"></script>
</body>

</html>
